aid: netreo
name: Netreo
description: >-
  Netreo is an IT infrastructure monitoring platform (now part of BMC as
  BMC Helix Operations Management with Netreo) that provides full-stack
  observability across networks, servers, applications, cloud services and
  databases. The platform exposes a documented REST API for programmatic
  access to monitoring data, configuration, and automation workflows.
